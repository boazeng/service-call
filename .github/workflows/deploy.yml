name: Deploy to production

# Auto-deploy: every push to main SSHes into the Lightsail server and runs
# deploy/redeploy.sh (git pull → rebuild → restart). Manual run also possible.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys run at once; let an in-flight one finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              'bash /opt/service-call/deploy/redeploy.sh'
