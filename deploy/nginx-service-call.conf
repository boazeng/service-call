# /etc/nginx/sites-available/service-call  (symlink into sites-enabled)
# certbot --nginx will add the listen 443 + SSL lines automatically.
server {
    listen 80;
    server_name service-call.newavera.co.il;

    # Built React SPA (frontend/dist uploaded/built on the server).
    root /opt/service-call/frontend/dist;
    index index.html;

    client_max_body_size 10m;

    # API → uvicorn on localhost. Same-origin, so no CORS needed.
    location /api/ {
        proxy_pass http://127.0.0.1:8020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA fallback — every non-file path serves index.html.
    location / {
        try_files $uri /index.html;
    }
}
